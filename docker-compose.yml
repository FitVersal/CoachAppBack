version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=8080
      - APP_ENV=production
      - ENABLE_API_DOCS=false
      - DB_URL=postgres://user:password@db:5432/coachapp?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change-me}
    ports:
      - "8080:8080"

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=coachapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d coachapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
